format_version: 1
instrument: instrument.yaml
duration_secs: 3
output: /tmp/kick_test.wav
play: true

timeline:
  - at: 0.0
    set_param:
      target: kick
      param: decay
      value: 0.3

  - at: 0.0
    set_param:
      target: kick
      param: drive
      value: 0.5

  - at: 1.0
    trigger:
      target: kick
      velocity: 1.0

  - at: 1.05
    trigger:
      target: kick
      velocity: 1.0

  - at: 1.10
    trigger:
      target: kick
      velocity: 1.0

probe:
  - at: 0.5
    path: "/node/20/param/decay"
  - at: 1.0
    path: "/node/20/param/decay"
  - at: 1.5
    path: "/node/20/param/decay"
  - at: 1.5
    path: "/node/20/param/drive"
