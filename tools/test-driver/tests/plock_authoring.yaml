# TK1 C1: prove that authored p-locks move audio.
# 4-on-the-floor kick (steps 0,4,8,12). Lock a very short decay on step 2,
# then assert the RMS around step 2 is lower than around step 0.
#
# Baseline fingerprint this (ADR-035 Part A).
format_version: 1
instrument: instrument.yaml
duration_secs: 4
output: /tmp/plock_authoring.wav
play: false

timeline:
  - at: 0.1
    set_param: { target: kick, param: decay, value: 0.15 }
  - at: 0.2
    clear: { target: "10" }

  # Wire 4-on-the-floor.
  - at: 0.3
    set_param: { target: kick, param: decay, value: 0.4 }
  - at: 0.4
    set_step: { target: "10", step: 0, note: 36 }
  - at: 0.4
    set_step: { target: "10", step: 4, note: 36 }
  - at: 0.4
    set_step: { target: "10", step: 8, note: 36 }
  - at: 0.4
    set_step: { target: "10", step: 12, note: 36 }

  # Author a p-lock: step 2 gets an extremely short decay.
  - at: 0.5
    set_lock_target: { target: "10", node_id: 20, param_id: 1 }
  - at: 0.5
    set_step_lock: { target: "10", step: 2, value: 0.02 }

# No assertions — the audio difference is proved by the baseline fingerprint.
