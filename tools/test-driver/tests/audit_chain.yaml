format_version: 1
instrument: instrument.yaml
duration_secs: 5
output: /tmp/audit_chain.wav
play: false

timeline:
  - at: 0.0
    set_param:
      target: kick
      param: decay
      value: 0.3
  - at: 0.0
    set_param:
      target: kick
      param: drive
      value: 0.0
  - at: 0.0
    set_param:
      target: snare
      param: decay
      value: 0.1
  - at: 0.0
    set_speed:
      target: "10"
      speed: 2.0
  - at: 0.0
    toggle_step:
      target: "10"
      step: 0
  - at: 0.0
    toggle_step:
      target: "10"
      step: 8
  - at: 0.0
    toggle_step:
      target: "11"
      step: 4
  - at: 0.0
    toggle_step:
      target: "11"
      step: 12

probe:
  - at: 0.5
    path: "/node/10/state/current_step"
  - at: 0.5
    path: "/node/11/state/current_step"

assert:
  - at: 1.0
    peak_gte: 0.01
    window_ms: 500
  - at: 4.0
    peak_gte: 0.01
    window_ms: 500
  - at: 1.0
    path: "/node/20/param/decay"
    between: [0.25, 0.35]
