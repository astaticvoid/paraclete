format_version: 1
instrument: instrument.yaml
duration_secs: 4
output: /tmp/audit_pattern.wav
play: false

timeline:
  - at: 0.0
    toggle_step: { target: "10", step: 0 }
  - at: 0.0
    toggle_step: { target: "10", step: 4 }
  - at: 0.0
    set_speed: { target: "10", speed: 1.0 }

  - at: 1.5
    set_pattern: { target: "10", pattern: 1 }
  - at: 1.5
    toggle_step: { target: "10", step: 2 }
  - at: 1.5
    toggle_step: { target: "10", step: 6 }
  - at: 1.5
    set_speed: { target: "10", speed: 0.5 }

probe:
  - at: 1.0
    path: "/node/10/state/active_pattern"
  - at: 1.0
    path: "/node/10/state/cued_pattern"
  - at: 2.0
    path: "/node/10/state/active_pattern"
  - at: 2.0
    path: "/node/10/state/cued_pattern"
  - at: 2.5
    path: "/node/10/state/active_pattern"
  - at: 2.5
    path: "/node/10/state/speed_mult"

assert:
  - at: 1.0
    path: "/node/10/state/active_pattern"
    eq: 0
  - at: 2.0
    path: "/node/10/state/cued_pattern"
    eq: 1
  - at: 2.5
    path: "/node/10/state/speed_mult"
    between: [0.4, 0.6]
