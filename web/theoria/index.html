<!-- Theoria W0 grid client — zero-build by design (w0-interfaces.md §Client). -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Theoria</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0b0b0e;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; touch-action: none; }
    #stale {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(40, 40, 46, 0.82);
      color: #ddd;
      font: 700 6vw system-ui, sans-serif;
      letter-spacing: 0.3em;
      z-index: 10;
    }
    #error {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #300;
      color: #fbb;
      font: 400 4vw system-ui, sans-serif;
      text-align: center;
      padding: 2em;
      z-index: 20;
    }
    #rtt {
      position: fixed;
      right: 8px;
      bottom: 6px;
      color: #667;
      font: 400 12px ui-monospace, monospace;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="surface"></canvas>
  <div id="stale">STALE</div>
  <div id="error"></div>
  <div id="rtt"></div>
  <script type="module" src="theoria.js"></script>
</body>
</html>
